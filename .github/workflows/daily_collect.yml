name: Daily Data Collect for AI-Inv

on:
  schedule:
    # 한국시간 기준 아침 7시부터 밤 11시까지, '2시간 간격'으로 실행 (가장 안정적)
    # (UTC 기준: 22시, 0시, 2시, 4시, 6시, 8시, 10시, 12시, 14시)
    # 새벽 0시 ~ 6시 사이에는 가동을 멈춰 사이트 IP 차단을 예방하고 무료 크레딧을 보존합니다.
    - cron: '0 22,0,2,4,6,8,10,12,14 * * *'
  workflow_dispatch:  # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Set Timezone to KST (Asia/Seoul)
      run: |
        sudo timedatectl set-timezone Asia/Seoul

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Collection Engine
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        TZ: Asia/Seoul
      run: |
        python main.py
